  <rect x="360" y="206" width="240" height="80" rx="8" fill="#f1f5f9" stroke="#64748b"/>
  <text x="480" y="242" text-anchor="middle" class="box">n8n shared runtime</text>
  <text x="480" y="264" text-anchor="middle" class="small">9 CRM workflows</text>

  <!-- crm sidecar -->
  <rect x="700" y="160" width="260" height="160" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
