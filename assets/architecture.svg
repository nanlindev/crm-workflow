  <text x="455" y="526" text-anchor="middle" class="small">system of record</text>
  <rect x="580" y="468" width="190" height="80" rx="8" fill="#faf5ff" stroke="#a855f7"/>
  <text x="675" y="504" text-anchor="middle" class="box">Slack</text>
  <text x="675" y="526" text-anchor="middle" class="small">Block Kit + digests</text>
  <rect x="800" y="468" width="190" height="80" rx="8" fill="#fff1f2" stroke="#f43f5e"/>
  <text x="895" y="504" text-anchor="middle" class="box">HubSpot</text>
  <text x="895" y="526" text-anchor="middle" class="small">Contact + DRAFT email</text>

  <!-- Edges -->
  <path class="edge" d="M260,176 L340,220"/>
  <path class="edge" d="M260,240 L340,240"/>
  <path class="edge" d="M260,304 L340,260"/>
  <path class="edge" d="M620,240 L700,240"/>
  <path class="edge" d="M480,320 L455,468"/>
  <path class="edge" d="M500,320 L675,468"/>
  <path class="edge" d="M520,320 L895,468"/>
  <path class="edge" d="M620,200 L1040,176"/>
  <path class="edge" d="M830,160 L1200,152"/>
  <path class="edge" d="M960,240 L1040,240"/>
  <path class="edge" d="M1200,200 L1200,220"/>
  <path class="edge" d="M1200,268 L1200,288"/>

  <text x="40" y="660" class="subtitle">correlation_id at Intake -&gt; X-Correlation-Id to sidecar -&gt; join Jaeger &lt;-&gt; Langfuse</text>
  <text x="40" y="690" class="subtitle">Demo isolation: dedicated Sheets / Slack channel / HubSpot sandbox / demo Tally + Calendly</text>
  <text x="40" y="740" class="small">Source: crm-workflow docs/en/ARCHITECTURE.md | portfolio asset #1</text>
