  </defs>

  <rect width="1400" height="780" fill="#f8fafc"/>
  <rect x="0" y="0" width="1400" height="72" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="40" y="38" class="title">B2B Lead Automation - Production Stack</text>
  <text x="40" y="58" class="subtitle">n8n + AI sidecar + HubSpot / Slack / Sheets + Jaeger / Langfuse</text>

  <!-- Ingress -->
  <rect x="40" y="110" width="220" height="280" rx="12" fill="#ffffff" stroke="#99f6e4" stroke-width="2"/>
  <text x="56" y="136" class="group">INGRESS</text>
  <rect x="60" y="152" width="180" height="48" rx="8" fill="#f0fdfa" stroke="#14b8a6"/>
