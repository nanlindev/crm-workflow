  <rect x="1040" y="110" width="320" height="280" rx="12" fill="#ffffff" stroke="#bae6fd" stroke-width="2"/>
  <text x="1056" y="136" class="group">OBSERVABILITY</text>
  <rect x="1060" y="152" width="280" height="48" rx="8" fill="#f0f9ff" stroke="#0ea5e9"/>
  <text x="1200" y="181" text-anchor="middle" class="box">otel-collector</text>
