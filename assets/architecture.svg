<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780">
  <defs>
    <style>
      .title { font: 700 28px "Segoe UI", system-ui, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px "Segoe UI", system-ui, sans-serif; fill: #64748b; }
      .group { font: 600 12px "Segoe UI", system-ui, sans-serif; fill: #334155; letter-spacing: 0.04em; }
      .box { font: 600 14px "Segoe UI", system-ui, sans-serif; fill: #0f172a; }
      .small { font: 400 12px "Segoe UI", system-ui, sans-serif; fill: #475569; }
      .edge { stroke: #64748b; stroke-width: 1.75; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
